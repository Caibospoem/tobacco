name: AI 解析卷烟投放策略

on:
  push:
    paths:
      - 'data/**.xlsx'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install openpyxl anthropic

      - name: AI 解析 xlsx
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python parse_xlsx.py

      - name: 提交解析结果
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/parsed_strategy.json
          git diff --staged --quiet || (git commit -m "AI 解析完成 [skip ci]" && git push)
